<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Management Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Project Management Tool</h1>
<p>Manage Projects and Tasks Easily</p>
</header>

<div class="container">

<div class="project-card">
<h2>Website Development</h2>
<p>Status: In Progress</p>
<p>Deadline: 30 June 2026</p>
<button>View Tasks</button>
</div>

<div class="project-card">
<h2>Mobile App Design</h2>
<p>Status: Completed</p>
<p>Deadline: 20 June 2026</p>
<button>View Tasks</button>
</div>

<div class="project-card">
<h2>E-Commerce Project</h2>
<p>Status: Pending</p>
<p>Deadline: 15 July 2026</p>
<button>View Tasks</button>
</div>

<div class="task-section">
<h2>Tasks</h2>

<label>
<input type="checkbox">
Create Homepage
</label>

<label>
<input type="checkbox">
Design Dashboard
</label>

<label>
<input type="checkbox">
Test Website
</label>

</div>

</div>

<footer>
<p>© 2026 Project Management Tool | CODSOFT</p>
</footer>

</body>
</html>
